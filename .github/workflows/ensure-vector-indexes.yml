name: Ensure Multiple Cloudflare Vector Indexes

on:
  workflow_dispatch:

jobs:
  ensure-indexes:
    runs-on: ubuntu-latest

    env:
      INDEX_PREFIX: memoflow-index
      INDEX_COUNT: ${{ vars.INDEX_COUNT }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure indexes exist (no file)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Checking INDEX_COUNT: '$INDEX_COUNT'"

          if ! [[ "$INDEX_COUNT" =~ ^[0-9]+$ ]]; then
            echo "❌ ERROR: INDEX_COUNT is not a valid number. Check your GitHub Variables."
            exit 1
          fi

          # get existing indexes
          raw_response=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/vectorize/v2/indexes" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
  
          # check API response is success
          if echo "$raw_response" | jq -e '.success == false' > /dev/null; then
            echo "❌ Cloudflare API Error:"
            echo "$raw_response" | jq .
            exit 1
          fi

          existing_indexes=$(echo "$raw_response" | jq -r '.result[]?.name')

          for ((i=0; i<$INDEX_COUNT; i++)); do
            INDEX_NAME="${INDEX_PREFIX}-${i}"
    
            if echo "$existing_indexes" | grep -q "^$INDEX_NAME$"; then
              echo "✔ $INDEX_NAME already exists"
              continue
            fi

            echo "➕ Creating $INDEX_NAME..."
    
            # get whole response of API call
            response=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/vectorize/v2/indexes" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -d "{
                    \"config\": {
                      \"dimensions\": 1024,
                      \"metric\": \"cosine\"
                    },
                    \"name\": \"$INDEX_NAME\",
                    \"description\": \"Auto-created by GitHub Actions\"
                  }")

            # check success field of API response
            is_success=$(echo "$response" | jq -r '.success')

            if [ "$is_success" != "true" ]; then
              echo "❌ Failed to create $INDEX_NAME"
              echo "Response detail: $response"
              exit 1
            fi

            echo "✅ Created $INDEX_NAME"
          done